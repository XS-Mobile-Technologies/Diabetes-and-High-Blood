<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Diabetes + BP Complete Health Plan 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito','Segoe UI',sans-serif;background:#f5f2ea;min-height:100vh;color:#2a2a2a;overflow-x:hidden;}
/* HEADER */
.hdr{background:linear-gradient(135deg,#3d6b4f,#2d5040);color:#fff;padding:18px 16px 12px;text-align:center;}
.hdr h1{font-family:'Libre Baskerville',Georgia,serif;font-size:17px;font-weight:700;margin-bottom:4px;line-height:1.3;}
.hdr p{font-size:11px;opacity:.78;line-height:1.4;}
.hdr-pills{display:flex;gap:5px;justify-content:center;margin-top:8px;flex-wrap:wrap;}
.pill{background:rgba(255,255,255,.18);border-radius:12px;padding:3px 9px;font-size:10px;font-weight:800;}
/* TABS */
.tabs{background:#2d5040;display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;padding:10px 10px 9px;color:rgba(255,255,255,.58);font-size:10px;font-weight:800;cursor:pointer;border:none;border-bottom:3px solid transparent;background:none;white-space:nowrap;font-family:inherit;letter-spacing:.3px;text-transform:uppercase;}
.tab.active{color:#fff;border-bottom-color:#c8915a;}
/* LAYOUT */
.content{max-width:640px;margin:0 auto;padding:15px 12px 80px;}
.panel{display:none;}.panel.active{display:block;}
/* TYPOGRAPHY */
.sec-title{font-family:'Libre Baskerville',Georgia,serif;font-size:17px;color:#3d6b4f;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.sec-sub{font-size:13px;color:#999;margin-bottom:12px;line-height:1.5;}
/* CARDS */
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:11px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e8e4dc;}
.card-title{font-weight:800;font-size:14px;color:#2d5040;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:800;margin:2px;letter-spacing:.3px;}
.bg{background:#d4edda;color:#2e7d45;}.ba{background:#fdf3e0;color:#b7770d;}
.br{background:#fde8e8;color:#c0392b;}.bb{background:#e0eeff;color:#1a5fb4;}.bp-badge{background:#ede0ff;color:#6a1fb4;}
/* TIPS */
.tip{background:#f0f7f2;border-left:4px solid #3d6b4f;border-radius:0 10px 10px 0;padding:11px 13px;font-size:13px;color:#2d5040;line-height:1.6;margin-bottom:11px;}
.tip-r{background:#fff0f0;border-left:color:#e07070;border-left:4px solid #e07070;color:#8b2222;}
.tip-b{background:#f0f4ff;border-left:4px solid #4a6eb5;color:#1a3a6b;}
.tip-a{background:#fffbf0;border-left:4px solid #c8915a;color:#7d4a00;}
.warn{background:#fff3cd;border:1px solid #f0c060;border-radius:8px;padding:8px 11px;font-size:12px;color:#7d5a00;margin:6px 0;display:flex;gap:7px;align-items:flex-start;line-height:1.4;}
/* PROGRESS */
.pbar{background:#e8e4dc;border-radius:10px;height:8px;overflow:hidden;}
.pfill{height:100%;background:#3d6b4f;border-radius:10px;transition:width .4s ease;}
.prow{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.prow-l{font-weight:800;font-size:14px;}.prow-r{font-weight:800;color:#3d6b4f;font-size:14px;}
/* DAY SELECTOR */
.day-sel{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;}
.day-sel::-webkit-scrollbar{display:none;}
.day-btn{flex:0 0 auto;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:800;cursor:pointer;border:2px solid #c8d8c0;background:#fff;color:#3d6b4f;font-family:inherit;-webkit-appearance:none;}
.day-btn.on{background:#3d6b4f;border-color:#3d6b4f;color:#fff;}
/* MEALS */
.meal-card{background:#fff;border-radius:14px;padding:13px;margin-bottom:9px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e8e4dc;}
.meal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.meal-lbl{font-weight:800;font-size:13px;color:#2d5040;display:flex;align-items:center;gap:5px;}
.meal-t{font-size:10px;color:#bbb;font-weight:600;}
.meal-row{display:flex;gap:10px;align-items:flex-start;cursor:pointer;}
.mchk{width:24px;height:24px;min-width:24px;border:2px solid #b8d4c0;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;background:#fff;}
.mchk.on{background:#3d6b4f;border-color:#3d6b4f;}
.mchk svg,.gchk svg,.pchk svg{display:none;}.mchk.on svg,.gchk.on svg,.pchk.on svg{display:block;}
.mname{font-weight:700;font-size:14px;line-height:1.3;}.mname.done{text-decoration:line-through;opacity:.4;}
.mnote{font-size:12px;color:#999;margin-top:3px;line-height:1.4;}
/* SEGMENTS */
.segs{display:flex;gap:5px;margin-bottom:12px;}
.seg{flex:1;padding:8px 4px;border:2px solid #e8e4dc;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;background:#fff;color:#2a2a2a;-webkit-appearance:none;}
.seg.on{background:#3d6b4f;border-color:#3d6b4f;color:#fff;}
/* ACCORDIONS */
.acc-hd{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:#f5f2ea;border-radius:10px;cursor:pointer;margin-bottom:4px;border:1px solid #e8e4dc;}
.acc-t{font-weight:800;font-size:13px;color:#2d5040;display:flex;align-items:center;gap:6px;}
.acc-body{display:none;background:#fff;border-radius:4px 4px 12px 12px;border:1px solid #e8e4dc;border-top:none;padding:12px;margin-bottom:8px;}
.acc-body.open{display:block;}
/* AVOID GRID */
.hlbl{display:grid;grid-template-columns:1fr 20px 1fr;gap:4px;margin-bottom:7px;}
.agrid{display:grid;grid-template-columns:1fr 20px 1fr;gap:4px;padding:8px 0;border-bottom:1px solid #f5f2ea;}
.agrid:last-child{border-bottom:none;}
.abad{font-size:12.5px;color:#c0392b;font-weight:600;line-height:1.3;}
.agd{font-size:12.5px;color:#2e7d45;font-weight:600;line-height:1.3;}
.aarr{text-align:center;color:#c8915a;font-size:12px;}
/* TABLE ROWS */
.trow{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:8px 0;border-bottom:1px solid #f5f2ea;font-size:13px;}
.trow:last-child{border-bottom:none;}
/* SECTION TAGS */
.stag{background:#f0f7f2;border:1px solid #b8d4c0;border-radius:8px;padding:8px 11px;font-size:13px;margin:4px 0;display:flex;align-items:flex-start;gap:7px;color:#2d5040;line-height:1.4;}
/* SPICES */
.spice{display:inline-block;background:#f0f7f2;color:#2d5040;border:1px solid #b8d4c0;border-radius:16px;padding:4px 9px;font-size:12px;font-weight:600;margin:3px;}
/* DRINKS */
.drow{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f5f2ea;align-items:flex-start;}
.drow:last-child{border-bottom:none;}
.di{font-size:21px;width:27px;text-align:center;flex-shrink:0;}
.dname{font-weight:700;font-size:13px;margin-bottom:2px;}.dnote{font-size:12px;color:#999;line-height:1.4;}
/* GI */
.gi-blk{margin-bottom:13px;}
.gi-lbl{font-size:12px;font-weight:800;margin-bottom:4px;}
.gi-trk{height:12px;background:#e8e4dc;border-radius:7px;overflow:hidden;margin-bottom:3px;}
.gi-fill{height:100%;border-radius:7px;}
.gi-ex{font-size:12px;color:#999;line-height:1.4;}
/* PIE */
.pie-wrap{display:flex;gap:15px;align-items:center;flex-wrap:wrap;}
.pie{width:150px;height:150px;border-radius:50%;flex-shrink:0;background:conic-gradient(#4a9e6e 0deg 180deg,#c8915a 180deg 270deg,#d4b483 270deg 360deg);border:5px solid #f5f2ea;box-shadow:0 3px 12px rgba(0,0,0,.12);}
.pie-lg{flex:1;min-width:145px;}
.pie-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;}
.pie-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;margin-top:2px;}
.pie-lbl{font-weight:800;font-size:13px;}.pie-ex{font-size:11px;color:#999;margin-top:1px;line-height:1.3;}
/* GROCERY */
.gcat{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#c8915a;margin:14px 0 5px;}
.gitem{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid #f5f2ea;cursor:pointer;}
.gitem:last-child{border-bottom:none;}
.gchk{width:22px;height:22px;min-width:22px;border:2px solid #b8d4c0;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.gchk.on{background:#3d6b4f;border-color:#3d6b4f;}
.gname{font-size:13px;flex:1;line-height:1.3;}.gname.done{text-decoration:line-through;opacity:.45;}
.gstore{font-size:10px;color:#c8915a;font-weight:800;white-space:nowrap;}
/* RESTAURANTS */
.rrow{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid #f5f2ea;align-items:flex-start;}
.rrow:last-child{border-bottom:none;}
.rico{width:42px;height:42px;min-width:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;}
.rname{font-weight:800;font-size:13px;margin-bottom:1px;}
.rloc{font-size:11px;color:#999;margin-bottom:3px;}
.rtip{font-size:12px;color:#2d5040;font-style:italic;line-height:1.4;}
/* BP */
.bp-hero{background:linear-gradient(135deg,#c0392b,#922b21);color:#fff;border-radius:14px;padding:16px;margin-bottom:12px;text-align:center;}
.bp-hero h3{font-family:'Libre Baskerville',Georgia,serif;font-size:15px;margin-bottom:5px;}
.bp-stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px;}
.bp-stat{background:rgba(255,255,255,.18);border-radius:10px;padding:10px;text-align:center;}
.bp-sv{font-size:19px;font-weight:800;line-height:1;}.bp-sl{font-size:10px;opacity:.85;margin-top:2px;}
.bp-2col{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.bp-col{border-radius:11px;padding:12px;}
.bp-colt{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.bp-coli{font-size:12px;line-height:1.7;}
.sod-bar{background:#e8e4dc;border-radius:10px;height:14px;overflow:hidden;margin:5px 0;}
.sod-fill{height:100%;border-radius:10px;display:flex;align-items:center;padding-left:7px;font-size:10px;font-weight:800;color:#fff;}
.min-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f5f2ea;}
.min-row:last-child{border-bottom:none;}
.min-ico{font-size:21px;width:28px;text-align:center;flex-shrink:0;}
.min-name{font-weight:800;font-size:13px;margin-bottom:2px;}
.min-note{font-size:12px;color:#999;line-height:1.4;}
.min-foods{font-size:12px;color:#2d5040;font-style:italic;margin-top:2px;}
.chg-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f5f2ea;align-items:flex-start;}
.chg-row:last-child{border-bottom:none;}
/* FOOD GUIDE */
.fg-cats{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:9px;padding-bottom:2px;}
.fg-cats::-webkit-scrollbar{display:none;}
.fg-cat{flex:0 0 auto;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:800;cursor:pointer;border:2px solid #e8e4dc;background:#fff;color:#2d5040;font-family:inherit;-webkit-appearance:none;}
.fg-cat.on{background:#3d6b4f;border-color:#3d6b4f;color:#fff;}
.fg-filters{display:flex;gap:5px;margin-bottom:11px;}
.fgf{flex:1;padding:7px 2px;border-radius:9px;font-size:10px;font-weight:800;cursor:pointer;border:2px solid;font-family:inherit;background:#fff;-webkit-appearance:none;text-align:center;}
.fgf-all{border-color:#3d6b4f;color:#3d6b4f;}.fgf-free{border-color:#2e7d45;color:#2e7d45;}
.fgf-mod{border-color:#b7770d;color:#b7770d;}.fgf-avoid{border-color:#c0392b;color:#c0392b;}
.fgf.on{color:#fff!important;}.fgf-all.on{background:#3d6b4f;}.fgf-free.on{background:#2e7d45;}
.fgf-mod.on{background:#b7770d;}.fgf-avoid.on{background:#c0392b;}
.fg-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid #f5f2ea;}
.fg-item:last-child{border-bottom:none;}
.fg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.fg-name{font-weight:700;font-size:14px;line-height:1.3;}
.fg-note{font-size:12px;color:#999;margin-top:2px;line-height:1.4;}
/* TRACKER */
.tr-date{text-align:center;font-family:'Libre Baskerville',Georgia,serif;font-size:15px;color:#3d6b4f;margin-bottom:13px;}
.tr-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:7px;margin-top:13px;}
.tr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tr-field label{font-size:11px;color:#999;font-weight:700;display:block;margin-bottom:3px;}
.tr-inp{border:2px solid #e8e4dc;border-radius:10px;padding:10px 12px;font-size:16px;font-family:inherit;font-weight:700;color:#2a2a2a;width:100%;-webkit-appearance:none;background:#fff;}
.tr-inp:focus{outline:none;border-color:#3d6b4f;}
.bp-inp-row{display:flex;align-items:center;gap:8px;}
.bp-inp-row .tr-inp{flex:1;text-align:center;}
.bp-sep{font-size:20px;color:#999;font-weight:800;flex-shrink:0;}
.water-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:4px;}
.wg{font-size:26px;cursor:pointer;padding:2px;transition:transform .1s;line-height:1;}
.wg.empty{opacity:.2;}.wg:active{transform:scale(.8);}
.mood-row{display:flex;gap:8px;}
.mood-btn{font-size:26px;cursor:pointer;padding:5px;border-radius:8px;border:2px solid transparent;transition:all .15s;}
.mood-btn.on{border-color:#3d6b4f;background:#f0f7f2;}
.tr-notes{width:100%;border:2px solid #e8e4dc;border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical;min-height:65px;-webkit-appearance:none;margin-top:2px;}
.tr-notes:focus{outline:none;border-color:#3d6b4f;}
.tr-btn{width:100%;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:8px;}
.tr-save{background:#3d6b4f;color:#fff;}.tr-save:active{background:#2d5040;}
.tr-export{background:#f0f4ff;color:#1a3a6b;border:2px solid #4a6eb5;margin-top:6px;}
.tr-ok{text-align:center;font-size:13px;color:#3d6b4f;font-weight:800;margin-top:7px;display:none;}
.ref-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f2ea;font-size:13px;gap:8px;}
.ref-row:last-child{border-bottom:none;}
.ref-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:800;white-space:nowrap;flex-shrink:0;}
.hist-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.hist-tbl th{padding:6px 3px;text-align:left;font-weight:800;color:#888;border-bottom:2px solid #e8e4dc;font-size:10px;}
.hist-tbl td{padding:6px 3px;border-bottom:1px solid #f5f2ea;}
/* LABEL */
.lbl-mock{background:#fff;border:3px solid #2a2a2a;border-radius:8px;padding:13px;font-family:'Courier New',monospace;font-size:11px;margin-bottom:12px;}
.lbl-mock h4{font-size:13px;font-weight:900;text-align:center;border-bottom:3px solid #2a2a2a;padding-bottom:6px;margin-bottom:7px;font-family:'Courier New',monospace;}
.lbl-hdr{display:flex;justify-content:space-between;font-weight:900;font-size:10px;border-bottom:1px solid #aaa;padding-bottom:4px;margin-bottom:4px;}
.lbl-r{display:flex;justify-content:space-between;align-items:center;padding:5px 3px;cursor:pointer;border-radius:4px;}
.lbl-r:hover,.lbl-r.hl{background:#fff8dc;}
.lbl-vals{display:flex;gap:20px;}
.lbl-vals span{min-width:50px;text-align:right;font-size:10.5px;}
.lbl-indent{padding-left:10px;}
.lbl-info{background:#fff8dc;border:1px solid #f0c060;border-radius:8px;padding:10px;margin:3px 0 5px;font-size:12px;line-height:1.5;font-family:'Nunito',sans-serif;display:none;}
.lbl-info.show{display:block;}
.num-row{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid #f5f2ea;}
.num-row:last-child{border-bottom:none;}
.num-t{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:800;white-space:nowrap;flex-shrink:0;}
.myth-q{font-weight:800;font-size:13px;color:#c0392b;margin-bottom:3px;}
.myth-a{font-size:12px;color:#444;line-height:1.5;padding-bottom:10px;border-bottom:1px solid #f5f2ea;margin-bottom:10px;}
.myth-a:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
/* MEAL PREP */
.prep-cat{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#c8915a;margin:13px 0 5px;}
.prep-item{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid #f5f2ea;cursor:pointer;}
.prep-item:last-child{border-bottom:none;}
.pchk{width:22px;height:22px;min-width:22px;border:2px solid #b8d4c0;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.pchk.on{background:#3d6b4f;border-color:#3d6b4f;}
.prep-task{font-size:13px;flex:1;line-height:1.3;}.prep-task.done{text-decoration:line-through;opacity:.45;}
.prep-meta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;}
.p-time{font-size:10px;background:#f0f7f2;color:#2d5040;border-radius:8px;padding:2px 7px;font-weight:700;}
.p-store{font-size:10px;background:#f5f0ff;color:#6a1fb4;border-radius:8px;padding:2px 7px;font-weight:700;}
/* QUICK MEALS */
.qm-card{background:#fff;border-radius:14px;border:1px solid #e8e4dc;margin-bottom:9px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.qm-hd{display:flex;justify-content:space-between;align-items:center;padding:13px;cursor:pointer;}
.qm-name{font-weight:800;font-size:14px;color:#2d5040;}
.qm-time{font-size:11px;font-weight:800;background:#f0f7f2;color:#2d5040;border-radius:8px;padding:3px 9px;flex-shrink:0;}
.qm-bd{display:none;padding:0 13px 12px;border-top:1px solid #f5f2ea;}
.qm-bd.open{display:block;}
.qm-sec{font-size:11px;font-weight:800;color:#c8915a;text-transform:uppercase;letter-spacing:.5px;margin:9px 0 5px;}
.qm-step{display:flex;gap:7px;font-size:13px;margin:4px 0;align-items:flex-start;line-height:1.4;}
.qm-num{background:#3d6b4f;color:#fff;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;margin-top:2px;}
.qm-ing{font-size:12.5px;color:#666;padding:2px 0;line-height:1.3;}
.qm-ing::before{content:'· ';color:#c8915a;font-weight:800;}
/* SUPPLEMENTS */
.supp-card{background:#fff;border-radius:14px;border:1px solid #e8e4dc;margin-bottom:9px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.supp-hd{display:flex;align-items:center;gap:10px;padding:13px;}
.supp-icon{font-size:23px;width:36px;text-align:center;}
.supp-nm{font-weight:800;font-size:14px;}
.supp-bd{padding:0 13px 12px;}
.supp-row{font-size:12.5px;padding:5px 0;border-bottom:1px solid #f5f2ea;display:flex;gap:8px;line-height:1.4;}
.supp-row:last-child{border-bottom:none;}
.supp-row strong{color:#2d5040;min-width:58px;flex-shrink:0;}
.med-row{padding:10px 0;border-bottom:1px solid #f5f2ea;}
.med-row:last-child{border-bottom:none;}
.med-nm{font-weight:800;font-size:13px;color:#2d5040;}
.med-int{font-size:12px;color:#c0392b;margin:2px 0;}
.med-act{font-size:12px;color:#666;line-height:1.4;}
/* PORTIONS */
.hand-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;}

function buildMeals(){
  const p=document.getElementById('panel-meals');
  p.innerHTML=`<h2 class="sec-title">🍽️ Daily Meal Plan</h2>`+
    tipBox('❤️ <strong>Dual-condition plan:</strong> Every meal is optimised for both blood sugar control and blood pressure management.','tip-b')+
    `<div class="day-sel" id="daySel"></div>`+
    `<div class="card"><div class="prow"><span class="prow-l">Today's Progress</span><span class="prow-r" id="mProg">0/6 meals</span></div><div class="pbar"><div class="pfill" id="mFill" style="width:0%"></div></div><div id="mWin" style="display:none;margin-top:7px;font-size:13px;color:#3d6b4f;font-weight:800">🎉 All meals completed!</div></div>`+
    `<div id="mCont"></div>`+
    tipBox('💡 <strong>Remember:</strong> Eat every 3–4 hours. Pair carbs with protein or fat. Flavour with herbs + lemon — not salt.');
  const sel=document.getElementById('daySel');
  DAYS.forEach(d=>{const b=el('button','day-btn'+(d==='Mon'?' on':''),d);b.onclick=()=>{mState.day=d;renderMeals();};sel.appendChild(b);});
  renderMeals();
}
function renderMeals(){
  document.querySelectorAll('.day-btn').forEach((b,i)=>b.className='day-btn'+(DAYS[i]===mState.day?' on':''));
  const cont=document.getElementById('mCont');cont.innerHTML='';
  const plan=PLAN[mState.day];let done=0;
  MMETA.forEach(m=>{
    const ck=mState.day+'-'+m.key;const on=!!mState.checked[ck];if(on)done++;
    const meal=plan[m.key];
    const gi=meal.gi==='L'?`<span class="badge bg">✅ Low GI</span>`:`<span class="badge ba">⚠️ Medium GI</span>`;
    const bp=meal.bp?`<span class="badge bp-badge">❤️ BP-Friendly</span>`:`<span class="badge ba">⚠️ Watch Sodium</span>`;
    const d=el('div','meal-card',
      `<div class="meal-hd"><div class="meal-lbl">${m.icon} ${m.lbl}</div><div class="meal-t">${m.time}</div></div>`+
      `<div class="meal-row" onclick="toggleMeal('${ck}')"><div class="mchk${on?' on':''}" id="mc-${ck}">${on?TICK:''}</div>`+
      `<div style="flex:1"><div class="mname${on?' done':''}" id="mn-${ck}">${meal.n}</div><div class="mnote">${meal.note}</div><div style="margin-top:5px">${gi}${bp}</div></div></div>`);
    cont.appendChild(d);
  });
  document.getElementById('mProg').textContent=done+'/'+MMETA.length+' meals';
  document.getElementById('mFill').style.width=Math.round(done/MMETA.length*100)+'%';
  const w=document.getElementById('mWin');w.style.display=done===MMETA.length?'block':'none';
}
window.toggleMeal=function(ck){
  mState.checked[ck]=!mState.checked[ck];const on=mState.checked[ck];
  const mc=document.getElementById('mc-'+ck);const mn=document.getElementById('mn-'+ck);
  if(mc){mc.className='mchk'+(on?' on':'');mc.innerHTML=on?TICK:'';}
  if(mn)mn.className='mname'+(on?' done':'');
  let d=0;MMETA.forEach(m=>{if(mState.checked[mState.day+'-'+m.key])d++;});
  document.getElementById('mProg').textContent=d+'/'+MMETA.length+' meals';
  document.getElementById('mFill').style.width=Math.round(d/MMETA.length*100)+'%';
  document.getElementById('mWin').style.display=d===MMETA.length?'block':'none';
};

function todayKey(){const d=new Date();return'dbhp_'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function loadDay(key){try{const s=localStorage.getItem(key||todayKey());return s?JSON.parse(s):{bs_f:'',bs_b:'',bs_l:'',bs_d:'',bp_s:'',bp_d:'',water:0,mood:0,notes:''};}catch(e){return{bs_f:'',bs_b:'',bs_l:'',bs_d:'',bp_s:'',bp_d:'',water:0,mood:0,notes:''};}}
function saveDay(data,key){try{localStorage.setItem(key||todayKey(),JSON.stringify(data));}catch(e){}}
function loadHistory(){
  const hist=[];
  for(let i=0;i<30;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const key='dbhp_'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    try{const s=localStorage.getItem(key);if(s)hist.push({date:key.replace('dbhp_',''),data:JSON.parse(s)});}catch(e){}
  }
  return hist;
}
function buildTracker(){
  const p=document.getElementById('panel-tracker');

window.exportCSV=function(){
  const hist=loadHistory();

  hist.forEach(h=>{
